name: TOTOSHA Release Check

on:
  push:
    paths:
      - 'release/**'
  workflow_dispatch:

jobs:
  check-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout updates repo
        uses: actions/checkout@v4

      - name: Show release files
        run: |
          echo "NEXORA Release System"
          echo "Checking release folder..."
          find release -maxdepth 3 -type f || true

      - name: Validate release structure
        run: |
          if [ ! -d "release" ]; then
            echo "release folder not found"
            exit 1
          fi
          echo "release folder exists"
          echo "Release check completed"
